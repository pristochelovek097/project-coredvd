name: build coredvd

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libsfml-dev \
          libavformat-dev \
          libavcodec-dev \
          libswscale-dev \
          libavutil-dev
    
    - name: compile
      run: |
        g++ src/main.cpp -o coredvd-linux \
          -lsfml-graphics -lsfml-window -lsfml-system \
          -lavformat -lavcodec -lswscale -lavutil \
          -lpthread -std=c++17 -O2
    
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: coredvd-linux
        path: coredvd-linux

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: setup msys2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: |
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-ffmpeg
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-pkg-config
    
    - name: download and install sfml 2.6.1
      shell: msys2 {0}
      run: |
        cd /
        curl -L -o sfml.zip https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-gcc-13.2.0-mingw-64-bit.zip
        unzip -o sfml.zip
        cp -r SFML-2.6.1/* /mingw64/
        rm -rf SFML-2.6.1 sfml.zip
        # проверка
        ls -la /mingw64/include/SFML/
        ls -la /mingw64/lib/libsfml*
    
    - name: compile
      shell: msys2 {0}
      run: |
        g++ src/main.cpp -o coredvd-windows.exe \
          -I/mingw64/include \
          -L/mingw64/lib \
          -lsfml-graphics -lsfml-window -lsfml-system \
          -lavformat -lavcodec -lswscale -lavutil \
          -static-libgcc -static-libstdc++ \
          -lpthread -std=c++17 -O2
    
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: coredvd-windows
        path: coredvd-windows.exe
