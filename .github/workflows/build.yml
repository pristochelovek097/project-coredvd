name: Build coreDVD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: List all files
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== All files ==="
        ls -la
        echo "=== Find all .cpp files ==="
        find . -name "*.cpp" -type f
        echo "=== Find main.cpp specifically ==="
        find . -name "main.cpp" -type f
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libsfml-dev \
          libavformat-dev \
          libavcodec-dev \
          libswscale-dev \
          libavutil-dev
    
    - name: Compile
      run: |
        # Пробуем разные варианты
        if [ -f "src/main.cpp" ]; then
          g++ src/main.cpp -o coredvd-linux \
            -lsfml-graphics -lsfml-window -lsfml-system \
            -lavformat -lavcodec -lswscale -lavutil \
            -lpthread -std=c++17 -O2
        elif [ -f "main.cpp" ]; then
          g++ main.cpp -o coredvd-linux \
            -lsfml-graphics -lsfml-window -lsfml-system \
            -lavformat -lavcodec -lswscale -lavutil \
            -lpthread -std=c++17 -O2
        elif [ -f "src/main.c" ]; then
          g++ src/main.c -o coredvd-linux \
            -lsfml-graphics -lsfml-window -lsfml-system \
            -lavformat -lavcodec -lswscale -lavutil \
            -lpthread -std=c++17 -O2
        else
          echo "No main.cpp found!"
          exit 1
        fi
    
    - uses: actions/upload-artifact@v4
      with:
        name: coredvd-linux
        path: coredvd-linux
